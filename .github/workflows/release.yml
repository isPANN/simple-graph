name: Release

on:
  push:
    branches: [main]
    paths: [Cargo.toml]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          NEW=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          OLD=$(git show HEAD~1:Cargo.toml | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)
          if [ "$NEW" = "$OLD" ]; then
            echo "No version change ($OLD). Skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed: $OLD → $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        if: steps.version.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: cargo test --all-features

      - name: Publish to crates.io
        if: steps.version.outputs.changed == 'true'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Extract changelog
        if: steps.version.outputs.changed == 'true'
        run: |
          VER="${{ steps.version.outputs.version }}"
          awk "/^## \[${VER}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          body_path: release-notes.md
          generate_release_notes: false
