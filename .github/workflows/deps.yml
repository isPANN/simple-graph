name: Dependency Update

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Update dependencies
        run: cargo update
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): weekly cargo update"
          title: "chore(deps): weekly cargo update"
          body: |
            Automated weekly `cargo update` to keep dependencies current.

            Run `cargo test --all-features` to verify.
          branch: deps/cargo-update
          delete-branch: true
          labels: dependencies
